<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>霊感クイズ</title>

<style>

body{
margin:0;
font-family:sans-serif;
text-align:center;
color:white;
background:black;
min-height:100vh;
padding:20px;
background-image:url("https://images.unsplash.com/photo-1509248961158-e54f6934749c");
background-size:cover;
background-position:center;
}

h1{
color:#ff4b4b;
}

.container{
max-width:600px;
margin:auto;
background:rgba(0,0,0,0.7);
padding:25px;
border-radius:15px;
}

button{
padding:15px;
width:80%;
margin:10px;
font-size:18px;
border:none;
border-radius:10px;
background:#222;
color:white;
cursor:pointer;
}

button:hover{
background:#a00000;
}

.ghost{
position:fixed;
font-size:150px;
left:50%;
top:50%;
transform:translate(-50%,-50%);
animation:jump 1s;
}

@keyframes jump{
0%{transform:translate(-50%,-50%) scale(0.2);}
50%{transform:translate(-50%,-70%) scale(1.2);}
100%{transform:translate(-50%,-50%) scale(1);}
}

.runghost{
position:fixed;
top:20%;
left:-200px;
font-size:120px;
animation:run 2s linear;
}

@keyframes run{
0%{left:-200px;}
100%{left:110%;}
}

#blood{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:linear-gradient(red,transparent);
opacity:0;
pointer-events:none;
}

.flash{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:white;
opacity:0;
}

</style>
</head>

<body>

<h1>👻霊感クイズ</h1>

<div class="container">

<div id="question"></div>

<div id="buttons"></div>

<div id="result"></div>

</div>

<div id="blood"></div>
<div class="flash" id="flash"></div>

<script>

const questions=[

"初めて行く場所なのに来たことがある気がする？",
"夢が現実になることがある？",
"人の気持ちを感じる？",
"嫌な予感が当たる？",
"誰もいないのに気配を感じる？",
"ゾクッとする場所がある？",
"夜中に目が覚める？",
"写真の空気を感じる？",
"金縛りになった？",
"勘が鋭いと言われる？",
"古い建物が苦手？",
"見られてる感じがある？",
"知らない場所の夢を見る？",
"直感で決める？",
"人混みで疲れる？",
"寒気を感じる？",
"場所の空気がわかる？",
"偶然が多い？",
"不思議な音を聞く？",
"霊感あると思う？"

]

let current=0
let score=0

function playSound(){

let ctx=new(window.AudioContext||window.webkitAudioContext)()

let osc=ctx.createOscillator()

let gain=ctx.createGain()

osc.type="sawtooth"

osc.frequency.value=400

gain.gain.value=0.1

osc.connect(gain)

gain.connect(ctx.destination)

osc.start()

osc.frequency.exponentialRampToValueAtTime(50,ctx.currentTime+0.5)

osc.stop(ctx.currentTime+0.5)

}

function showQuestion(){

if(current>=questions.length){
showResult()
return
}

document.getElementById("question").innerHTML=

"<h2>"+questions[current]+"</h2>"

document.getElementById("buttons").innerHTML=

`
<button onclick="answer(3,event)">よくある</button>
<button onclick="answer(2,event)">たまにある</button>
<button onclick="answer(1,event)">あまりない</button>
<button onclick="answer(0,event)">ない</button>
`

}

function answer(point,e){

score+=point

effect(e)

current++

setTimeout(showQuestion,500)

}

function effect(e){

playSound()

if(navigator.vibrate){
navigator.vibrate([100,50,100])
}

let ghost=document.createElement("div")
ghost.className="ghost"
ghost.innerHTML="👻"
document.body.appendChild(ghost)

setTimeout(()=>ghost.remove(),900)

let run=document.createElement("div")
run.className="runghost"
run.innerHTML="👻"
document.body.appendChild(run)

setTimeout(()=>run.remove(),2000)

let flash=document.getElementById("flash")
flash.style.opacity=1
setTimeout(()=>flash.style.opacity=0,200)

let blood=document.getElementById("blood")
blood.style.opacity=0.6
setTimeout(()=>blood.style.opacity=0,800)

}

function getResult(percent){

if(percent>=85){

return{

title:"🔮かなり霊感が強い",

desc:"あなたは周囲の空気や感情の変化を非常に敏感に感じ取るタイプです。人が気づかないような小さな違和感や雰囲気の変化を直感的に察知する力があり、実際にその感覚が当たることも多いでしょう。人混みや重たい空気の場所では疲れやすいこともありますが、それはあなたの感受性が高い証拠でもあります。無理に怖い場所へ行くより、自分が安心できる環境を大切にすることが重要です。"

}

}

if(percent>=65){

return{

title:"👻霊感がある",

desc:"あなたは直感が鋭く、周囲の雰囲気や気配を感じ取りやすいタイプです。強い霊感というほどではなくても、人の感情や場の空気の変化を自然と察知する能力があります。後から振り返ると『あの時の予感は当たっていた』と思うことも多いでしょう。自分の直感を大切にしつつ、冷静さも保てるバランスの良いタイプです。"

}

}

if(percent>=40){

return{

title:"✨直感が鋭い",

desc:"あなたは霊感というよりも、観察力や直感力が優れているタイプです。周囲の変化を自然と読み取り、人の表情や雰囲気から多くの情報を感じ取っています。怖い話や不思議な体験に対しても、冷静に楽しめるタイプでしょう。"

}

}

return{

title:"🙂現実派タイプ",

desc:"あなたは現実的に物事を考えるタイプです。霊的な感覚よりも、事実や状況を見て判断する冷静さがあります。そのため、怖い話や不思議な現象にも落ち着いて向き合うことができるでしょう。周囲の人に安心感を与える存在でもあります。"

}

}

function showResult(){

let max=questions.length*3

let percent=Math.round(score/max*100)

let r=getResult(percent)

document.getElementById("question").innerHTML=""

document.getElementById("buttons").innerHTML=""

document.getElementById("result").innerHTML=

`
<h2>${r.title}</h2>
<h1>霊感レベル ${percent}%</h1>
<p>${r.desc}</p>

<button onclick="location.reload()">もう一度</button>

<button onclick="share()">Xでシェア</button>
`

}

function share(){

let url="https://jun4668.github.io/Reikan/"

window.open("https://twitter.com/intent/tweet?text=霊感クイズやってみた👻&url="+url)

}

showQuestion()

</script>

</body>
</html>
