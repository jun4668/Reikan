<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>霊感クイズ</title>
<style>
  body{
    margin:0;
    font-family:sans-serif;
    text-align:center;
    color:white;
    min-height:100vh;
    padding:20px 12px 36px;
    background:
      linear-gradient(rgba(0,0,0,.55), rgba(0,0,0,.9)),
      url("https://images.unsplash.com/photo-1509248961158-e54f6934749c?auto=format&fit=crop&w=1200&q=80");
    background-size:cover;
    background-position:center;
    overflow-x:hidden;
  }

  h1{
    color:#ff4d4d;
    margin:8px 0 18px;
    font-size:32px;
    text-shadow:0 0 12px rgba(255,0,0,.45);
  }

  .container{
    max-width:560px;
    margin:auto;
    background:rgba(0,0,0,.74);
    border-radius:18px;
    padding:22px 16px 28px;
    box-shadow:0 10px 30px rgba(0,0,0,.45);
  }

  #count{
    color:#d0d0d0;
    font-size:14px;
    margin-bottom:12px;
  }

  #question{
    font-size:22px;
    line-height:1.6;
    min-height:80px;
    margin-bottom:18px;
  }

  button{
    display:block;
    width:100%;
    max-width:360px;
    margin:10px auto;
    padding:15px 16px;
    border:none;
    border-radius:12px;
    font-size:17px;
    cursor:pointer;
    background:#1f1f1f;
    color:white;
  }

  button:hover{
    background:#b70000;
  }

  .start-btn{
    background:#7a0018;
    font-weight:bold;
  }

  .share-btn{
    background:#1d9bf0;
    font-weight:bold;
  }

  .retry-btn{
    background:#555;
  }

  .small{
    margin-top:15px;
    font-size:13px;
    color:#bbbbbb;
    line-height:1.6;
  }

  .result-title{
    font-size:28px;
    margin:10px 0 6px;
  }

  .percent{
    font-size:34px;
    font-weight:bold;
    color:#ffdada;
    margin:8px 0;
  }

  .score{
    font-size:16px;
    color:#d8d8d8;
  }

  .desc{
    font-size:16px;
    color:#f0f0f0;
    margin-top:12px;
    line-height:1.7;
  }

  .tap-ghost{
    position:fixed;
    width:120px;
    height:120px;
    pointer-events:none;
    z-index:9999;
    transform:translate(-50%,-50%);
    animation:ghostBurst .9s ease-out forwards;
    font-size:90px;
    line-height:120px;
    text-align:center;
    filter:drop-shadow(0 0 14px rgba(255,255,255,.4));
  }

  @keyframes ghostBurst{
    0%{
      transform:translate(-50%,-50%) scale(.2);
      opacity:0;
    }
    25%{
      transform:translate(-50%,-50%) scale(1.2);
      opacity:1;
    }
    100%{
      transform:translate(-50%,-170%) scale(.95);
      opacity:0;
    }
  }

  .cross-ghost{
    position:fixed;
    top:22%;
    left:-140px;
    font-size:90px;
    z-index:9998;
    animation:crossRun 1.4s linear forwards;
    filter:drop-shadow(0 0 14px rgba(255,255,255,.4));
  }

  @keyframes crossRun{
    0%{
      left:-140px;
      opacity:0;
    }
    10%{
      opacity:1;
    }
    100%{
      left:110vw;
      opacity:0;
    }
  }

  #jumpScare{
    position:fixed;
    inset:0;
    display:none;
    z-index:10001;
    background:rgba(0,0,0,.78);
    align-items:center;
    justify-content:center;
    font-size:180px;
  }

  #jumpScare.show{
    display:flex;
    animation:jumpFlash .7s ease-out forwards;
  }

  @keyframes jumpFlash{
    0%{opacity:0; transform:scale(.7);}
    25%{opacity:1; transform:scale(1.15);}
    100%{opacity:0; transform:scale(1);}
  }

  #blood{
    position:fixed;
    inset:0;
    pointer-events:none;
    z-index:10000;
    opacity:0;
    background:
      radial-gradient(circle at 10% 0%, rgba(120,0,0,.96) 0 54px, transparent 55px),
      radial-gradient(circle at 38% 0%, rgba(130,0,0,.96) 0 58px, transparent 59px),
      radial-gradient(circle at 76% 0%, rgba(120,0,0,.96) 0 60px, transparent 61px),
      linear-gradient(to bottom, rgba(115,0,0,.9), rgba(70,0,0,.26) 24%, transparent 58%);
  }

  #blood.on{
    animation:bloodDrop 1.1s ease-out;
  }

  @keyframes bloodDrop{
    0%{opacity:0; transform:translateY(-24px);}
    25%{opacity:1;}
    100%{opacity:0; transform:translateY(10px);}
  }

  #flash{
    position:fixed;
    inset:0;
    background:rgba(255,255,255,.14);
    opacity:0;
    pointer-events:none;
    z-index:9997;
  }

  #flash.on{
    animation:flashBg .22s linear;
  }

  @keyframes flashBg{
    0%{opacity:0;}
    30%{opacity:1;}
    100%{opacity:0;}
  }

  body.shake{
    animation:screenShake .35s ease-in-out;
  }

  @keyframes screenShake{
    0%{transform:translate(0,0);}
    20%{transform:translate(-8px,4px);}
    40%{transform:translate(8px,-4px);}
    60%{transform:translate(-5px,3px);}
    80%{transform:translate(5px,-3px);}
    100%{transform:translate(0,0);}
  }
</style>
</head>
<body>

<div id="flash"></div>
<div id="blood"></div>
<div id="jumpScare">👻</div>

<h1>👻 霊感クイズ</h1>

<div class="container">
  <div id="count"></div>
  <div id="question"></div>
  <div id="buttons"></div>
  <div id="result"></div>
  <div class="small">※ホラー演出つきのエンタメ診断です</div>
</div>

<script>
const questions = [
  "初めて行く場所なのに、来たことがある気がする？",
  "夢で見たことが現実になったことがある？",
  "人の気持ちをなんとなく感じることがある？",
  "嫌な予感が当たることがある？",
  "誰もいないのに気配を感じることがある？",
  "突然ゾクッとする場所がある？",
  "夜中に目が覚めて何かを感じることがある？",
  "写真を見ると、その場の空気を感じることがある？",
  "金縛りにあったことがある？",
  "人に『勘が鋭い』と言われることがある？",
  "古い建物に入ると空気が重いと感じる？",
  "誰かに見られている気がすることがある？",
  "知らない景色が夢に出てきたことがある？",
  "直感で決めたことが当たりやすい？",
  "人混みに行くとどっと疲れる？",
  "急に寒気がすることがある？",
  "場所によって落ち着かない感じがある？",
  "偶然にしては出来すぎた体験がある？",
  "不思議な音を聞いたことがある？",
  "自分には少し霊感があると思う？"
];

let current = 0;
let score = 0;
let soundEnabled = false;
let audioCtx = null;
let bgmTimer = null;

function initAudio(){
  if(audioCtx) return;
  const AC = window.AudioContext || window.webkitAudioContext;
  if(!AC) return;
  audioCtx = new AC();
}

function ensureAudio(){
  if(!audioCtx) return;
  if(audioCtx.state === "suspended"){
    audioCtx.resume().catch(()=>{});
  }
}

function playTone(freq = 220, duration = .15, type = "sine", volume = .05){
  if(!soundEnabled || !audioCtx) return;
  ensureAudio();
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type;
  osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
  gain.gain.setValueAtTime(volume, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime + duration);
}

function playScareSound(){
  if(!soundEnabled || !audioCtx) return;
  ensureAudio();

  const now = audioCtx.currentTime;
  const osc1 = audioCtx.createOscillator();
  const osc2 = audioCtx.createOscillator();
  const gain = audioCtx.createGain();

  osc1.type = "sawtooth";
  osc2.type = "triangle";

  osc1.frequency.setValueAtTime(900, now);
  osc1.frequency.exponentialRampToValueAtTime(110, now + .5);

  osc2.frequency.setValueAtTime(650, now);
  osc2.frequency.exponentialRampToValueAtTime(90, now + .5);

  gain.gain.setValueAtTime(.0001, now);
  gain.gain.exponentialRampToValueAtTime(.13, now + .02);
  gain.gain.exponentialRampToValueAtTime(.0001, now + .55);

  osc1.connect(gain);
  osc2.connect(gain);
  gain.connect(audioCtx.destination);

  osc1.start(now);
  osc2.start(now);
  osc1.stop(now + .56);
  osc2.stop(now + .56);
}

function startBgm(){
  if(!soundEnabled || !audioCtx) return;
  if(bgmTimer) clearInterval(bgmTimer);

  const drone = () => {
    if(!soundEnabled || !audioCtx) return;
    ensureAudio();

    const now = audioCtx.currentTime;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();

    osc.type = "sine";
    osc.frequency.setValueAtTime(73, now);

    gain.gain.setValueAtTime(.0001, now);
    gain.gain.exponentialRampToValueAtTime(.03, now + .8);
    gain.gain.exponentialRampToValueAtTime(.0001, now + 4.0);

    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start(now);
    osc.stop(now + 4.1);

    setTimeout(() => playTone(146, .18, "triangle", .014), 1500);
  };

  drone();
  bgmTimer = setInterval(drone, 4000);
}

function showStartScreen(){
  document.getElementById("count").textContent = "";
  document.getElementById("question").innerHTML = "音ありで始めますか？";
  document.getElementById("buttons").innerHTML = `
    <button class="start-btn" onclick="startQuiz(true)">🔊 音ありで始める</button>
    <button onclick="startQuiz(false)">🔇 音なしで始める</button>
  `;
  document.getElementById("result").innerHTML = "";
}

function startQuiz(withSound){
  soundEnabled = withSound;
  initAudio();
  ensureAudio();

  if(withSound){
    startBgm();
  }else{
    if(bgmTimer) clearInterval(bgmTimer);
  }

  current = 0;
  score = 0;
  showQuestion();
}

function showQuestion(){
  if(current >= questions.length){
    showResult();
    return;
  }

  document.getElementById("count").textContent =
    "質問 " + (current + 1) + " / " + questions.length;

  document.getElementById("question").innerHTML =
    "<div>" + questions[current] + "</div>";

  document.getElementById("buttons").innerHTML = `
    <button onclick="answer(3, event)">よくある</button>
    <button onclick="answer(2, event)">たまにある</button>
    <button onclick="answer(1, event)">あまりない</button>
    <button onclick="answer(0, event)">ない</button>
  `;

  document.getElementById("result").innerHTML = "";
}

function answer(point, ev){
  score += point;

  const x = ev ? ev.clientX : window.innerWidth / 2;
  const y = ev ? ev.clientY : window.innerHeight / 2;

  tapGhost(x, y);

  const rand = Math.random();
  if(rand < 0.4){
    setTimeout(crossGhost, 110);
  }else if(rand < 0.65){
    setTimeout(jumpScare, 120);
  }else if(rand < 0.82){
    setTimeout(bloodEffect, 100);
  }

  current++;
  setTimeout(showQuestion, 450);
}

function tapGhost(x, y){
  const ghost = document.createElement("div");
  ghost.className = "tap-ghost";
  ghost.textContent = "👻";
  ghost.style.left = x + "px";
  ghost.style.top = y + "px";
  document.body.appendChild(ghost);

  flashEffect();
  shakeScreen();
  bloodEffect();
  vibratePhone();
  playScareSound();

  setTimeout(() => ghost.remove(), 980);
}

function crossGhost(){
  const ghost = document.createElement("div");
  ghost.className = "cross-ghost";
  ghost.textContent = "👻";
  document.body.appendChild(ghost);

  flashEffect();
  shakeScreen();
  vibratePhone([80,30,80]);
  playScareSound();

  setTimeout(() => ghost.remove(), 1450);
}

function jumpScare(){
  const jump = document.getElementById("jumpScare");
  jump.classList.add("show");

  flashEffect();
  bloodEffect();
  shakeScreen();
  vibratePhone([120,50,120]);
  playScareSound();

  setTimeout(() => {
    jump.classList.remove("show");
  }, 720);
}

function bloodEffect(){
  const blood = document.getElementById("blood");
  blood.classList.remove("on");
  void blood.offsetWidth;
  blood.classList.add("on");
}

function flashEffect(){
  const flash = document.getElementById("flash");
  flash.classList.remove("on");
  void flash.offsetWidth;
  flash.classList.add("on");
}

function shakeScreen(){
  document.body.classList.remove("shake");
  void document.body.offsetWidth;
  document.body.classList.add("shake");
  setTimeout(() => {
    document.body.classList.remove("shake");
  }, 390);
}

function vibratePhone(pattern = [60,40,90]){
  if(navigator.vibrate){
    navigator.vibrate(pattern);
  }
}

function getResult(percent){
  if(percent >= 85){
    return {
      title:"🔮 かなり霊感が強い",
      desc:"あなたは、人や場所の空気の変化をかなり深く感じ取るタイプです。言葉にできない違和感や、なんとなく危ないと感じる直感が鋭く働きやすく、後から振り返ると『やっぱりあの感覚は当たっていた』と思うことも少なくないでしょう。人の感情やその場の重たい空気を受け取りやすいため、にぎやかな場所や疲れている人のそばに長くいると、理由もなくどっと疲れてしまうことがあるかもしれません。恋愛では相手の気持ちの変化に敏感で、言葉になる前に違和感に気づきやすい反面、相手の不安や迷いまで背負ってしまう傾向があります。仕事では周囲の空気を読む力が強く、危険察知や人間関係の微妙な変化に早く気づけるのが大きな強みです。夜は感覚がさらに冴えやすく、静かな場所では不思議な気配を感じることもありそうです。"
    };
  }
  if(percent >= 65){
    return {
      title:"👻 霊感がある",
      desc:"あなたは、見えない空気や気配の変化にかなり気づきやすいタイプです。はっきりと何かが見えるというより、なんとなく嫌な感じがしたり、場所や人に対して『ここは少し変だな』と察知したりする力があります。特に体調が良い時や気持ちが静かな時ほど、その感覚は強く出やすいでしょう。恋愛では相手の本音や温度差に敏感で、少しの違和感でもすぐ気づきやすい一方、考えすぎて不安を大きくしてしまうこともあります。仕事では空気を読む力や先回りして危険を避ける感覚が役立ちやすく、対人面ではかなり有利です。"
    };
  }
  if(percent >= 40){
    return {
      title:"✨ 直感が鋭い",
      desc:"あなたは、霊感が特別強いというよりも、勘の良さや感受性の高さに恵まれたタイプです。人の表情や話し方、その場の空気感などから小さな違和感を自然に読み取る力があり、無意識のうちに『何か変だな』と気づけることが多いでしょう。そのため、危険を避けたり、人間関係の微妙なズレを察知したりする能力に優れています。恋愛では相手の態度の変化に比較的早く気づきやすく、駆け引きよりも直感で相手を見抜く傾向があります。"
    };
  }
  return {
    title:"🙂 現実派タイプ",
    desc:"あなたは、物事を落ち着いて現実的に受け止めるタイプです。雰囲気や気配に過度に左右されにくく、怖い話や不思議な出来事に対しても、まずは冷静に状況を見て判断しようとする傾向があります。そのため、周囲がざわついている場面でも必要以上に不安にならず、自分の感覚をしっかり保てる強さを持っています。恋愛では感情に流されるより、相手の行動や言葉を見て信頼を築くタイプで、安定感のある関係を好むでしょう。"
  };
}

function showResult(){
  const maxScore = questions.length * 3;
  const percent = Math.round((score / maxScore) * 100);
  const result = getResult(percent);

  document.getElementById("count").textContent = "診断結果";
  document.getElementById("question").innerHTML = "";
  document.getElementById("buttons").innerHTML = `
    <button class="share-btn" onclick="shareX()">Xでシェア</button>
    <button class="retry-btn" onclick="showStartScreen()">もう一度やる</button>
  `;

  document.getElementById("result").innerHTML = `
    <div class="result-title">${result.title}</div>
    <div class="percent">霊感レベル ${percent}%</div>
    <div class="score">スコア ${score} / ${maxScore}</div>
    <div class="desc">${result.desc}</div>
  `;
}

function shareX(){
  const maxScore = questions.length * 3;
  const percent = Math.round((score / maxScore) * 100);
  const result = getResult(percent);
  const url = "https://jun4668.github.io/Reikan/";
  const text = `👻霊感クイズをやってみた\n${result.title}\n霊感レベル ${percent}%`;

  window.open(
    "https://twitter.com/intent/tweet?text=" +
    encodeURIComponent(text) +
    "&url=" +
    encodeURIComponent(url),
    "_blank"
  );
}

showStartScreen();
</script>
</body>
</html>
