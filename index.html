<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>霊感クイズ</title>
  <style>
    *{
      box-sizing:border-box;
    }

    body{
      margin:0;
      font-family:sans-serif;
      text-align:center;
      color:white;
      min-height:100vh;
      padding:24px 14px 40px;
      background:
        linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.82)),
        url("https://images.unsplash.com/photo-1509248961158-e54f6934749c?auto=format&fit=crop&w=1200&q=80");
      background-size:cover;
      background-position:center;
      background-attachment:fixed;
      overflow-x:hidden;
    }

    h1{
      color:#ff4b4b;
      margin:10px 0 20px;
      font-size:32px;
      text-shadow:0 0 10px rgba(255,0,0,0.35);
    }

    .container{
      max-width:560px;
      margin:auto;
      background:rgba(0,0,0,0.75);
      padding:24px 16px 28px;
      border-radius:16px;
      box-shadow:0 10px 30px rgba(0,0,0,0.45);
    }

    #count{
      color:#d6d6d6;
      font-size:14px;
      margin-bottom:14px;
    }

    #question{
      font-size:22px;
      line-height:1.6;
      min-height:80px;
      margin-bottom:20px;
    }

    button{
      display:block;
      width:100%;
      max-width:360px;
      margin:10px auto;
      padding:14px 16px;
      border:none;
      border-radius:10px;
      font-size:17px;
      cursor:pointer;
      background:#222;
      color:white;
      transition:0.2s;
    }

    button:hover{
      background:#c70000;
      transform:scale(1.02);
    }

    .share-btn{
      background:#1d9bf0;
      font-weight:bold;
    }

    .share-btn:hover{
      background:#0f7fca;
    }

    .retry-btn{
      background:#555;
    }

    .retry-btn:hover{
      background:#777;
    }

    .start-btn{
      background:#7a0018;
      font-weight:bold;
    }

    .start-btn:hover{
      background:#a30022;
    }

    #result{
      margin-top:10px;
      line-height:1.8;
    }

    .result-title{
      font-size:28px;
      margin:10px 0 6px;
    }

    .percent{
      font-size:34px;
      font-weight:bold;
      color:#ffd7d7;
      margin:8px 0;
    }

    .score{
      font-size:16px;
      color:#d5d5d5;
    }

    .desc{
      font-size:16px;
      color:#f0f0f0;
      margin-top:12px;
    }

    .small{
      margin-top:16px;
      font-size:13px;
      color:#bbbbbb;
      line-height:1.6;
    }

    #ghost{
      display:none;
      position:fixed;
      inset:0;
      z-index:9999;
      background:
        rgba(0,0,0,0.55)
        url("https://i.imgur.com/8Q2QY1F.png")
        center center / min(72vw, 320px)
        no-repeat;
      animation:flash 0.2s linear 5;
    }

    @keyframes flash{
      0%{opacity:0;}
      50%{opacity:1;}
      100%{opacity:0;}
    }

    .tap-ghost{
      position:fixed;
      width:120px;
      max-width:32vw;
      pointer-events:none;
      transform:translate(-50%,-50%);
      animation:ghostPop 1s ease-out forwards;
      z-index:10000;
      filter:drop-shadow(0 0 12px rgba(255,255,255,0.25));
    }

    @keyframes ghostPop{
      0%{
        transform:translate(-50%,-50%) scale(0.1) rotate(-8deg);
        opacity:0;
      }
      35%{
        transform:translate(-50%,-50%) scale(1.15) rotate(5deg);
        opacity:1;
      }
      100%{
        transform:translate(-50%,-160%) scale(1) rotate(0deg);
        opacity:0;
      }
    }
  </style>
</head>
<body>

  <div id="ghost"></div>

  <h1>👻 霊感クイズ</h1>

  <div class="container">
    <div id="count"></div>
    <div id="question"></div>
    <div id="buttons"></div>
    <div id="result"></div>
    <div class="small">※ホラー演出つきのエンタメ診断です</div>
  </div>

  <audio id="bgm" loop preload="auto">
    <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_5b7c1c0a4a.mp3?filename=horror-ambience-110228.mp3" type="audio/mpeg">
  </audio>

  <audio id="scream" preload="auto">
    <source src="https://cdn.pixabay.com/download/audio/2022/03/10/audio_0e4b0e9a21.mp3?filename=scary-sound-2-110394.mp3" type="audio/mpeg">
  </audio>

  <script>
    const questions = [
      "初めて行く場所なのに、来たことがある気がする？",
      "夢で見たことが現実になったことがある？",
      "人の気持ちをなんとなく感じることがある？",
      "嫌な予感が当たることがある？",
      "誰もいないのに気配を感じることがある？",
      "突然ゾクッとする場所がある？",
      "夜中に目が覚めて何かを感じることがある？",
      "写真を見ると、その場の空気を感じることがある？",
      "金縛りにあったことがある？",
      "人に『勘が鋭い』と言われることがある？",
      "古い建物に入ると空気が重いと感じる？",
      "誰かに見られている気がすることがある？",
      "知らない景色が夢に出てきたことがある？",
      "直感で決めたことが当たりやすい？",
      "人混みに行くとどっと疲れる？",
      "急に寒気がすることがある？",
      "場所によって落ち着かない感じがある？",
      "偶然にしては出来すぎた体験がある？",
      "不思議な音を聞いたことがある？",
      "自分には少し霊感があると思う？"
    ];

    let current = 0;
    let score = 0;
    let soundEnabled = false;

    function showStartScreen() {
      document.getElementById("count").textContent = "";
      document.getElementById("question").innerHTML = "音ありで始めますか？";
      document.getElementById("buttons").innerHTML = `
        <button class="start-btn" onclick="startQuiz(true)">🔊 音ありで始める</button>
        <button onclick="startQuiz(false)">🔇 音なしで始める</button>
      `;
      document.getElementById("result").innerHTML = "";
    }

    function startQuiz(withSound) {
      soundEnabled = withSound;

      if (withSound) {
        const bgm = document.getElementById("bgm");
        const scream = document.getElementById("scream");

        bgm.volume = 0.3;
        scream.volume = 0.85;

        bgm.play().then(() => {
          bgm.pause();
          bgm.currentTime = 0;
          return bgm.play();
        }).catch(() => {});

        scream.play().then(() => {
          scream.pause();
          scream.currentTime = 0;
        }).catch(() => {});
      }

      current = 0;
      score = 0;
      showQuestion();
    }

    function showQuestion(){
      if(current >= questions.length){
        showResult();
        return;
      }

      document.getElementById("count").textContent =
        "質問 " + (current + 1) + " / " + questions.length;

      document.getElementById("question").innerHTML =
        "<div>" + questions[current] + "</div>";

      document.getElementById("buttons").innerHTML = `
        <button onclick="answer(3, event)">よくある</button>
        <button onclick="answer(2, event)">たまにある</button>
        <button onclick="answer(1, event)">あまりない</button>
        <button onclick="answer(0, event)">ない</button>
      `;

      document.getElementById("result").innerHTML = "";
    }

    function answer(point, event){
      score += point;
      current++;

      if(soundEnabled && Math.random() < 0.55){
        const x = event ? event.clientX : window.innerWidth / 2;
        const y = event ? event.clientY : window.innerHeight / 2;
        tapGhost(x, y);
      }

      setTimeout(showQuestion, 220);
    }

    function tapGhost(x, y){
      const ghost = document.createElement("img");
      ghost.src = "https://i.imgur.com/8Q2QY1F.png";
      ghost.className = "tap-ghost";
      ghost.style.left = x + "px";
      ghost.style.top = y + "px";
      document.body.appendChild(ghost);

      if(soundEnabled){
        const scream = document.getElementById("scream");
        scream.currentTime = 0;
        scream.play().catch(() => {});
      }

      setTimeout(() => {
        ghost.remove();
      }, 1000);
    }

    function getResult(percent){
      if(percent >= 85){
        return {
          title:"🔮 かなり霊感が強い",
          desc:"人や場所の空気の変化にかなり敏感なタイプ。無理に怖い場所へ行かない方がよさそうです…。"
        };
      }
      if(percent >= 65){
        return {
          title:"👻 霊感がある",
          desc:"直感がかなり鋭く、見えない違和感を拾いやすいタイプかもしれません。"
        };
      }
      if(percent >= 40){
        return {
          title:"✨ 直感が鋭い",
          desc:"霊感というより、勘や感受性が高めのタイプ。空気を読む力がありそうです。"
        };
      }
      return {
        title:"🙂 現実派タイプ",
        desc:"落ち着いて物事を判断するタイプ。怖い話でも比較的冷静に楽しめそうです。"
      };
    }

    function showResult(){
      const maxScore = questions.length * 3;
      const percent = Math.round((score / maxScore) * 100);
      const result = getResult(percent);

      document.getElementById("count").textContent = "診断結果";
      document.getElementById("question").innerHTML = "";
      document.getElementById("buttons").innerHTML = `
        <button class="share-btn" onclick="shareX()">Xでシェア</button>
        <button class="retry-btn" onclick="showStartScreen()">もう一度やる</button>
      `;

      document.getElementById("result").innerHTML = `
        <div class="result-title">${result.title}</div>
        <div class="percent">霊感レベル ${percent}%</div>
        <div class="score">スコア ${score} / ${maxScore}</div>
        <div class="desc">${result.desc}</div>
      `;
    }

    function shareX(){
      const maxScore = questions.length * 3;
      const percent = Math.round((score / maxScore) * 100);
      const result = getResult(percent);
      const url = "https://jun4668.github.io/Reikan/";
      const text = `👻霊感クイズをやってみた\n${result.title}\n霊感レベル ${percent}%`;

      window.open(
        "https://twitter.com/intent/tweet?text=" +
        encodeURIComponent(text) +
        "&url=" +
        encodeURIComponent(url),
        "_blank"
      );
    }

    showStartScreen();
  </script>
</body>
</html>
