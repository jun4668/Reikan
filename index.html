<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>霊感クイズ</title>
  <style>
    *{
      box-sizing:border-box;
    }

    body{
      margin:0;
      font-family:sans-serif;
      color:white;
      text-align:center;
      min-height:100vh;
      padding:24px 16px 40px;
      background:
        linear-gradient(rgba(0,0,0,0.65), rgba(0,0,0,0.75)),
        url("https://images.unsplash.com/photo-1509248961158-e54f6934749c?auto=format&fit=crop&w=1200&q=80");
      background-size:cover;
      background-position:center;
      background-attachment:fixed;
    }

    h1{
      margin:10px 0 22px;
      color:#ff5c5c;
      text-shadow:0 0 10px rgba(255,0,0,0.35);
      font-size:32px;
    }

    .container{
      max-width:560px;
      margin:0 auto;
      background:rgba(0,0,0,0.72);
      border:1px solid rgba(255,255,255,0.08);
      border-radius:16px;
      padding:24px 18px 28px;
      box-shadow:0 10px 30px rgba(0,0,0,0.45);
      backdrop-filter:blur(2px);
    }

    .count{
      font-size:14px;
      color:#cfcfcf;
      margin-bottom:14px;
    }

    #question{
      font-size:22px;
      line-height:1.6;
      margin-bottom:20px;
      min-height:72px;
    }

    button{
      display:block;
      width:100%;
      max-width:360px;
      margin:10px auto;
      padding:14px 16px;
      border:none;
      border-radius:10px;
      font-size:17px;
      cursor:pointer;
      background:#1f1f1f;
      color:white;
      transition:transform .15s ease, background .2s ease;
    }

    button:hover{
      background:#b30000;
      transform:scale(1.02);
    }

    .share-btn{
      background:#1d9bf0;
      font-weight:bold;
    }

    .share-btn:hover{
      background:#0c7ecf;
    }

    .retry-btn{
      background:#444;
    }

    .retry-btn:hover{
      background:#666;
    }

    #result{
      margin-top:12px;
      font-size:20px;
      line-height:1.8;
    }

    .score{
      font-size:16px;
      color:#d8d8d8;
      margin-top:10px;
    }

    .percent{
      font-size:28px;
      color:#ffcbcb;
      font-weight:bold;
      margin-top:8px;
    }

    #ghost{
      display:none;
      position:fixed;
      inset:0;
      z-index:9999;
      background:
        rgba(0,0,0,0.55)
        url("https://i.imgur.com/8Q2QY1F.png")
        center center / min(70vw, 320px)
        no-repeat;
      animation:flash 0.25s linear 4;
    }

    @keyframes flash{
      0%{opacity:0;}
      50%{opacity:1;}
      100%{opacity:0;}
    }

    .small{
      font-size:13px;
      color:#bdbdbd;
      margin-top:14px;
      line-height:1.6;
    }
  </style>
</head>
<body>

  <div id="ghost"></div>

  <h1>👻 霊感クイズ</h1>

  <div class="container">
    <div class="count" id="count"></div>
    <div id="question"></div>
    <div id="buttons"></div>
    <div id="result"></div>
    <div class="small">※ホラー演出つきのエンタメ診断です</div>
  </div>

  <audio id="bgm" loop>
    <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_5b7c1c0a4a.mp3?filename=horror-ambience-110228.mp3" type="audio/mpeg">
  </audio>

  <audio id="scream">
    <source src="https://cdn.pixabay.com/download/audio/2022/03/10/audio_0e4b0e9a21.mp3?filename=scary-sound-2-110394.mp3" type="audio/mpeg">
  </audio>

  <script>
    const questions = [
      "初めて行く場所なのに、来たことがある気がする？",
      "人の気持ちを、言葉にされる前に感じることがある？",
      "夢で見たことが現実になったことがある？",
      "嫌な予感が妙に当たることがある？",
      "誰もいないのに気配を感じることがある？",
      "古い建物に入ると空気が重いと感じる？",
      "突然ゾクッとする場所がある？",
      "夜中に目が覚めて、何かを感じることがある？",
      "写真を見るだけでその場の雰囲気がわかる気がする？",
      "人から『勘が鋭い』と言われることがある？",
      "人混みに行くとどっと疲れることがある？",
      "知らないはずの景色が夢に出てきたことがある？"
    ];

    let current = 0;
    let score = 0;
    let startedBgm = false;

    function startBgmOnce() {
      if (!startedBgm) {
        const bgm = document.getElementById("bgm");
        bgm.volume = 0.35;
        bgm.play().catch(() => {});
        startedBgm = true;
      }
    }

    function showQuestion() {
      if (current >= questions.length) {
        showResult();
        return;
      }

      document.getElementById("count").textContent =
        `質問 ${current + 1} / ${questions.length}`;

      document.getElementById("question").innerHTML =
        `<div>${questions[current]}</div>`;

      document.getElementById("buttons").innerHTML = `
        <button onclick="answer(3)">よくある</button>
        <button onclick="answer(2)">たまにある</button>
        <button onclick="answer(1)">あまりない</button>
        <button onclick="answer(0)">ない</button>
      `;

      document.getElementById("result").innerHTML = "";
    }

    function answer(points) {
      startBgmOnce();

      score += points;
      current++;

      if (Math.random() < 0.25) {
        jumpScare();
      }

      setTimeout(showQuestion, 250);
    }

    function jumpScare() {
      const ghost = document.getElementById("ghost");
      const scream = document.getElementById("scream");

      ghost.style.display = "block";
      scream.currentTime = 0;
      scream.volume = 0.8;
      scream.play().catch(() => {});

      setTimeout(() => {
        ghost.style.display = "none";
      }, 1000);
    }

    function getResultText(percent) {
      if (percent >= 80) return "🔮 かなり霊感が強いタイプ…";
      if (percent >= 60) return "👻 霊感を持っている可能性があります";
      if (percent >= 35) return "✨ 直感が鋭いタイプ";
      return "🙂 現実派タイプ";
    }

    function showResult() {
      const maxScore = questions.length * 3;
      const percent = Math.round((score / maxScore) * 100);
      const resultText = getResultText(percent);

      document.getElementById("count").textContent = "診断結果";
      document.getElementById("question").innerHTML = "";
      document.getElementById("buttons").innerHTML = `
        <button class="share-btn" onclick="shareX()">Xで結果をシェア</button>
        <button class="retry-btn" onclick="retryQuiz()">もう一度やる</button>
      `;

      document.getElementById("result").innerHTML = `
        <div>${resultText}</div>
        <div class="percent">霊感レベル ${percent}%</div>
        <div class="score">スコア：${score} / ${maxScore}</div>
      `;
    }

    function shareX() {
      const maxScore = questions.length * 3;
      const percent = Math.round((score / maxScore) * 100);
      const resultText = getResultText(percent);
      const url = "https://jun4668.github.io/Reikan";
      const text = `👻霊感クイズをやってみた\n${resultText}\n霊感レベル ${percent}%`;

      window.open(
        "https://twitter.com/intent/tweet?text=" +
        encodeURIComponent(text) +
        "&url=" +
        encodeURIComponent(url),
        "_blank"
      );
    }

    function retryQuiz() {
      current = 0;
      score = 0;
      showQuestion();
    }

    showQuestion();
  </script>
</body>
</html>
