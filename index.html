<!DOCTYPE html><html lang="ja">
<head>
<meta charset="UTF-8">
<title>霊感クイズ</title><style>

body{
font-family:sans-serif;
text-align:center;
color:white;
background:black;
background-image:url("https://images.unsplash.com/photo-1509248961158-e54f6934749c");
background-size:cover;
padding:30px;
}

.container{
max-width:520px;
margin:auto;
background:rgba(0,0,0,0.75);
padding:30px;
border-radius:12px;
}

h1{
color:#ff4b4b;
}

button{
display:block;
width:80%;
margin:10px auto;
padding:14px;
border-radius:8px;
border:none;
font-size:16px;
background:#222;
color:white;
}

button:hover{
background:#ff0000;
}

#ghost{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:url("https://i.imgur.com/8Q2QY1F.png") center no-repeat;
background-size:40%;
display:none;
z-index:999;
}

</style></head><body><div id="ghost"></div><h1>👻霊感クイズ</h1><div class="container"><div id="question"></div><div id="buttons"></div><div id="result"></div></div><audio autoplay loop>
<source src="https://cdn.pixabay.com/audio/2022/03/15/audio_5b7c1c0a4a.mp3">
</audio><audio id="scream">
<source src="https://cdn.pixabay.com/audio/2022/03/10/audio_0e4b0e9a21.mp3">
</audio><script>

const questions=[

"初めて行く場所なのに来たことがある気がする？",
"夢が現実になることがある？",
"人の気持ちがなんとなくわかる？",
"嫌な予感が当たることがある？",
"誰もいないのに気配を感じる？",
"突然ゾクっとすることがある？",
"夜中に目が覚めることがある？",
"写真に不思議なものが写る？",
"金縛りにあったことがある？",
"勘が鋭いと言われる？",
"古い場所が苦手？",
"誰かに見られている気がすることがある？",
"夢の中で知らない場所を見る？",
"直感で決めることが多い？",
"心霊の話が好き？",
"誰かの感情に影響されやすい？",
"夜道が怖い？",
"急に寒気がすることがある？",
"偶然がよく起こる？",
"不思議な体験をしたことがある？"

];

let current=0;
let score=0;

function showQuestion(){

if(current>=questions.length){
showResult();
return;
}

document.getElementById("question").innerHTML="<h3>"+questions[current]+"</h3>";

document.getElementById("buttons").innerHTML=`

<button onclick="answer(3)">よくある</button>
<button onclick="answer(2)">たまにある</button>
<button onclick="answer(1)">あまりない</button>
<button onclick="answer(0)">ない</button>

`;

}

function answer(p){

score+=p;
current++;

if(Math.random()<0.25){
jumpScare();
}

showQuestion();

}

function jumpScare(){

const ghost=document.getElementById("ghost");

ghost.style.display="block";

document.getElementById("scream").play();

setTimeout(()=>{
ghost.style.display="none";
},1200);

}

function showResult(){

let percent=Math.round(score/(questions.length*3)*100);

let text="";

if(percent>80){
text="🔮霊感かなり強い";
}
else if(percent>60){
text="👻霊感がある";
}
else if(percent>30){
text="✨直感が鋭い";
}
else{
text="🙂普通タイプ";
}

document.getElementById("question").innerHTML="診断結果";

document.getElementById("buttons").innerHTML="";

document.getElementById("result").innerHTML=

"<h2>"+text+"</h2>"+
"<h3>霊感レベル "+percent+"%</h3>"+
"<br><button onclick='shareX()'>Xでシェア</button>";

}

function shareX(){

let url="https://jun4668.github.io/Reikan";

let text="👻霊感クイズやってみた";

window.open("https://twitter.com/intent/tweet?text="+text+"&url="+url);

}

showQuestion();

</script></body>
</html>
