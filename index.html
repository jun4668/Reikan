<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>霊感クイズ</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: sans-serif;
      text-align: center;
      color: white;
      min-height: 100vh;
      padding: 20px 12px 36px;
      background:
        linear-gradient(rgba(0, 0, 0, 0.55), rgba(0, 0, 0, 0.86)),
        url("https://images.unsplash.com/photo-1509248961158-e54f6934749c?auto=format&fit=crop&w=1200&q=80");
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      overflow-x: hidden;
    }

    body.shake {
      animation: screenShake 0.35s ease-in-out;
    }

    @keyframes screenShake {
      0% { transform: translate(0, 0); }
      20% { transform: translate(-6px, 3px); }
      40% { transform: translate(6px, -3px); }
      60% { transform: translate(-4px, 2px); }
      80% { transform: translate(4px, -2px); }
      100% { transform: translate(0, 0); }
    }

    h1 {
      color: #ff4d4d;
      margin: 8px 0 18px;
      font-size: 32px;
      text-shadow: 0 0 12px rgba(255, 0, 0, 0.45);
    }

    .container {
      max-width: 560px;
      margin: auto;
      background: rgba(0, 0, 0, 0.74);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 18px;
      padding: 22px 16px 28px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(2px);
    }

    #count {
      color: #d0d0d0;
      font-size: 14px;
      margin-bottom: 12px;
    }

    #question {
      font-size: 22px;
      line-height: 1.6;
      min-height: 80px;
      margin-bottom: 18px;
    }

    button {
      display: block;
      width: 100%;
      max-width: 360px;
      margin: 10px auto;
      padding: 15px 16px;
      border: none;
      border-radius: 12px;
      font-size: 17px;
      cursor: pointer;
      background: #1f1f1f;
      color: white;
      transition: transform .15s ease, background .2s ease;
    }

    button:hover {
      background: #b70000;
      transform: scale(1.02);
    }

    .start-btn {
      background: #7a0018;
      font-weight: bold;
    }

    .start-btn:hover {
      background: #a30022;
    }

    .share-btn {
      background: #1d9bf0;
      font-weight: bold;
    }

    .share-btn:hover {
      background: #0d7dc7;
    }

    .retry-btn {
      background: #555;
    }

    .retry-btn:hover {
      background: #777;
    }

    #result {
      margin-top: 10px;
      line-height: 1.8;
    }

    .result-title {
      font-size: 28px;
      margin: 10px 0 6px;
    }

    .percent {
      font-size: 34px;
      font-weight: bold;
      color: #ffdada;
      margin: 8px 0;
    }

    .score {
      font-size: 16px;
      color: #d8d8d8;
    }

    .desc {
      font-size: 16px;
      color: #f0f0f0;
      margin-top: 12px;
      line-height: 1.7;
    }

    .small {
      margin-top: 15px;
      font-size: 13px;
      color: #bbbbbb;
      line-height: 1.6;
    }

    .tap-ghost {
      position: fixed;
      width: 130px;
      max-width: 34vw;
      pointer-events: none;
      transform: translate(-50%, -50%);
      z-index: 9999;
      animation: ghostBurst 0.95s ease-out forwards;
      filter: drop-shadow(0 0 16px rgba(255, 255, 255, 0.28));
    }

    @keyframes ghostBurst {
      0% {
        transform: translate(-50%, -50%) scale(0.15) rotate(-8deg);
        opacity: 0;
      }
      25% {
        transform: translate(-50%, -50%) scale(1.18) rotate(6deg);
        opacity: 1;
      }
      100% {
        transform: translate(-50%, -180%) scale(0.95) rotate(0deg);
        opacity: 0;
      }
    }

    .flash {
      position: fixed;
      inset: 0;
      background: rgba(255, 255, 255, 0.12);
      pointer-events: none;
      opacity: 0;
      z-index: 9998;
    }

    .flash.on {
      animation: flashBg 0.25s linear;
    }

    @keyframes flashBg {
      0% { opacity: 0; }
      30% { opacity: 1; }
      100% { opacity: 0; }
    }
  </style>
</head>
<body>
  <div class="flash" id="flash"></div>

  <h1>👻 霊感クイズ</h1>

  <div class="container">
    <div id="count"></div>
    <div id="question"></div>
    <div id="buttons"></div>
    <div id="result"></div>
    <div class="small">※ホラー演出つきのエンタメ診断です</div>
  </div>

  <audio id="bgm" loop preload="auto">
    <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_5b7c1c0a4a.mp3?filename=horror-ambience-110228.mp3" type="audio/mpeg">
  </audio>

  <audio id="scream" preload="auto">
    <source src="https://cdn.pixabay.com/download/audio/2022/03/10/audio_0e4b0e9a21.mp3?filename=scary-sound-2-110394.mp3" type="audio/mpeg">
  </audio>

  <script>
    const questions = [
      "初めて行く場所なのに、来たことがある気がする？",
      "夢で見たことが現実になったことがある？",
      "人の気持ちをなんとなく感じることがある？",
      "嫌な予感が当たることがある？",
      "誰もいないのに気配を感じることがある？",
      "突然ゾクッとする場所がある？",
      "夜中に目が覚めて何かを感じることがある？",
      "写真を見ると、その場の空気を感じることがある？",
      "金縛りにあったことがある？",
      "人に『勘が鋭い』と言われることがある？",
      "古い建物に入ると空気が重いと感じる？",
      "誰かに見られている気がすることがある？",
      "知らない景色が夢に出てきたことがある？",
      "直感で決めたことが当たりやすい？",
      "人混みに行くとどっと疲れる？",
      "急に寒気がすることがある？",
      "場所によって落ち着かない感じがある？",
      "偶然にしては出来すぎた体験がある？",
      "不思議な音を聞いたことがある？",
      "自分には少し霊感があると思う？"
    ];

    let current = 0;
    let score = 0;
    let soundEnabled = false;

    function showStartScreen() {
      document.getElementById("count").textContent = "";
      document.getElementById("question").innerHTML = "音ありで始めますか？";
      document.getElementById("buttons").innerHTML = `
        <button class="start-btn" onclick="startQuiz(true)">🔊 音ありで始める</button>
        <button onclick="startQuiz(false)">🔇 音なしで始める</button>
      `;
      document.getElementById("result").innerHTML = "";
    }

    function startQuiz(withSound) {
      soundEnabled = withSound;

      const bgm = document.getElementById("bgm");
      const scream = document.getElementById("scream");

      bgm.volume = 0.35;
      scream.volume = 1.0;

      if (withSound) {
        bgm.play().catch(() => {});
      } else {
        bgm.pause();
        bgm.currentTime = 0;
      }

      current = 0;
      score = 0;
      showQuestion();
    }

    function showQuestion() {
      if (current >= questions.length) {
        showResult();
        return;
      }

      document.getElementById("count").textContent =
        "質問 " + (current + 1) + " / " + questions.length;

      document.getElementById("question").innerHTML =
        "<div>" + questions[current] + "</div>";

      document.getElementById("buttons").innerHTML = `
        <button onclick="answer(3, event)">よくある</button>
        <button onclick="answer(2, event)">たまにある</button>
        <button onclick="answer(1, event)">あまりない</button>
        <button onclick="answer(0, event)">ない</button>
      `;

      document.getElementById("result").innerHTML = "";
    }

    function answer(point, event) {
      score += point;

      const x = event ? event.clientX : window.innerWidth / 2;
      const y = event ? event.clientY : window.innerHeight / 2;

      tapGhost(x, y);

      current++;
      setTimeout(showQuestion, 320);
    }

    function tapGhost(x, y) {
      const ghost = document.createElement("img");
      ghost.src = "https://i.imgur.com/8Q2QY1F.png";
      ghost.className = "tap-ghost";
      ghost.style.left = x + "px";
      ghost.style.top = y + "px";
      document.body.appendChild(ghost);

      const flash = document.getElementById("flash");
      flash.classList.remove("on");
      void flash.offsetWidth;
      flash.classList.add("on");

      document.body.classList.remove("shake");
      void document.body.offsetWidth;
      document.body.classList.add("shake");

      if (navigator.vibrate) {
        navigator.vibrate([60, 40, 90]);
      }

      if (soundEnabled) {
        const scream = document.getElementById("scream");
        scream.pause();
        scream.currentTime = 0;
        scream.play().catch(() => {});
      }

      setTimeout(() => {
        ghost.remove();
      }, 950);

      setTimeout(() => {
        document.body.classList.remove("shake");
      }, 380);
    }

    function getResult(percent) {
      if (percent >= 85) {
        return {
          title: "🔮 かなり霊感が強い",
          desc: "人や場所の空気の変化にかなり敏感なタイプ。無理に怖い場所へ行かない方がよさそうです…。"
        };
      }
      if (percent >= 65) {
        return {
          title: "👻 霊感がある",
          desc: "直感がかなり鋭く、見えない違和感を拾いやすいタイプかもしれません。"
        };
      }
      if (percent >= 40) {
        return {
          title: "✨ 直感が鋭い",
          desc: "霊感というより、勘や感受性が高めのタイプ。空気を読む力がありそうです。"
        };
      }
      return {
        title: "🙂 現実派タイプ",
        desc: "落ち着いて物事を判断するタイプ。怖い話でも比較的冷静に楽しめそうです。"
      };
    }

    function showResult() {
      const maxScore = questions.length * 3;
      const percent = Math.round((score / maxScore) * 100);
      const result = getResult(percent);

      document.getElementById("count").textContent = "診断結果";
      document.getElementById("question").innerHTML = "";
      document.getElementById("buttons").innerHTML = `
        <button class="share-btn" onclick="shareX()">Xでシェア</button>
        <button class="retry-btn" onclick="showStartScreen()">もう一度やる</button>
      `;

      document.getElementById("result").innerHTML = `
        <div class="result-title">${result.title}</div>
        <div class="percent">霊感レベル ${percent}%</div>
        <div class="score">スコア ${score} / ${maxScore}</div>
        <div class="desc">${result.desc}</div>
      `;
    }

    function shareX() {
      const maxScore = questions.length * 3;
      const percent = Math.round((score / maxScore) * 100);
      const result = getResult(percent);
      const url = "https://jun4668.github.io/Reikan/";
      const text = `👻霊感クイズをやってみた\n${result.title}\n霊感レベル ${percent}%`;

      window.open(
        "https://twitter.com/intent/tweet?text=" +
        encodeURIComponent(text) +
        "&url=" +
        encodeURIComponent(url),
        "_blank"
      );
    }

    showStartScreen();
  </script>
</body>
</html>
