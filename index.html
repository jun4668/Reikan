<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>霊感クイズ</title>
  <style>
    *{
      box-sizing:border-box;
    }

    body{
      margin:0;
      font-family:sans-serif;
      text-align:center;
      color:white;
      min-height:100vh;
      padding:20px 12px 36px;
      background:
        linear-gradient(rgba(0,0,0,0.55), rgba(0,0,0,0.88)),
        url("https://images.unsplash.com/photo-1509248961158-e54f6934749c?auto=format&fit=crop&w=1200&q=80");
      background-size:cover;
      background-position:center;
      background-attachment:fixed;
      overflow-x:hidden;
      overflow-y:auto;
    }

    body.shake{
      animation:screenShake .38s ease-in-out;
    }

    @keyframes screenShake{
      0%{transform:translate(0,0);}
      20%{transform:translate(-8px,4px);}
      40%{transform:translate(8px,-4px);}
      60%{transform:translate(-5px,3px);}
      80%{transform:translate(5px,-3px);}
      100%{transform:translate(0,0);}
    }

    h1{
      color:#ff4d4d;
      margin:8px 0 18px;
      font-size:32px;
      text-shadow:0 0 12px rgba(255,0,0,0.45);
    }

    .container{
      max-width:560px;
      margin:auto;
      background:rgba(0,0,0,0.74);
      border:1px solid rgba(255,255,255,0.08);
      border-radius:18px;
      padding:22px 16px 28px;
      box-shadow:0 10px 30px rgba(0,0,0,0.45);
      backdrop-filter:blur(2px);
      position:relative;
      z-index:2;
    }

    #count{
      color:#d0d0d0;
      font-size:14px;
      margin-bottom:12px;
    }

    #question{
      font-size:22px;
      line-height:1.6;
      min-height:80px;
      margin-bottom:18px;
    }

    button{
      display:block;
      width:100%;
      max-width:360px;
      margin:10px auto;
      padding:15px 16px;
      border:none;
      border-radius:12px;
      font-size:17px;
      cursor:pointer;
      background:#1f1f1f;
      color:white;
      transition:transform .15s ease, background .2s ease;
    }

    button:hover{
      background:#b70000;
      transform:scale(1.02);
    }

    .start-btn{
      background:#7a0018;
      font-weight:bold;
    }

    .start-btn:hover{
      background:#a30022;
    }

    .share-btn{
      background:#1d9bf0;
      font-weight:bold;
    }

    .share-btn:hover{
      background:#0d7dc7;
    }

    .retry-btn{
      background:#555;
    }

    .retry-btn:hover{
      background:#777;
    }

    #result{
      margin-top:10px;
      line-height:1.8;
    }

    .result-title{
      font-size:28px;
      margin:10px 0 6px;
    }

    .percent{
      font-size:34px;
      font-weight:bold;
      color:#ffdada;
      margin:8px 0;
    }

    .score{
      font-size:16px;
      color:#d8d8d8;
    }

    .desc{
      font-size:16px;
      color:#f0f0f0;
      margin-top:12px;
      line-height:1.7;
    }

    .small{
      margin-top:15px;
      font-size:13px;
      color:#bbbbbb;
      line-height:1.6;
    }

    .tap-ghost{
      position:fixed;
      width:130px;
      max-width:34vw;
      pointer-events:none;
      transform:translate(-50%,-50%);
      z-index:9999;
      animation:ghostBurst .95s ease-out forwards;
      filter:drop-shadow(0 0 18px rgba(255,255,255,.35));
    }

    @keyframes ghostBurst{
      0%{
        transform:translate(-50%,-50%) scale(.15) rotate(-8deg);
        opacity:0;
      }
      25%{
        transform:translate(-50%,-50%) scale(1.18) rotate(6deg);
        opacity:1;
      }
      100%{
        transform:translate(-50%,-180%) scale(.95) rotate(0deg);
        opacity:0;
      }
    }

    .cross-ghost{
      position:fixed;
      top:20%;
      left:-180px;
      width:170px;
      pointer-events:none;
      z-index:9997;
      filter:drop-shadow(0 0 18px rgba(255,255,255,.4));
      animation:crossRun 1.4s linear forwards;
    }

    @keyframes crossRun{
      0%{
        left:-180px;
        top:18%;
        opacity:0;
        transform:scale(.8) rotate(-6deg);
      }
      10%{
        opacity:1;
      }
      100%{
        left:110vw;
        top:28%;
        opacity:0;
        transform:scale(1.15) rotate(4deg);
      }
    }

    #jumpScare{
      position:fixed;
      inset:0;
      display:none;
      z-index:10001;
      background:
        rgba(0,0,0,.72)
        url("https://i.imgur.com/8Q2QY1F.png")
        center center / min(78vw, 360px)
        no-repeat;
      animation:jumpFlash .7s ease-out forwards;
      pointer-events:none;
    }

    @keyframes jumpFlash{
      0%{opacity:0; transform:scale(.7);}
      25%{opacity:1; transform:scale(1.15);}
      100%{opacity:0; transform:scale(1);}
    }

    #flash{
      position:fixed;
      inset:0;
      background:rgba(255,255,255,.14);
      opacity:0;
      pointer-events:none;
      z-index:9998;
    }

    #flash.on{
      animation:flashBg .22s linear;
    }

    @keyframes flashBg{
      0%{opacity:0;}
      30%{opacity:1;}
      100%{opacity:0;}
    }

    #blood{
      position:fixed;
      inset:0;
      pointer-events:none;
      z-index:10000;
      opacity:0;
      background:
        radial-gradient(circle at 15% 0%, rgba(120,0,0,.95) 0 55px, transparent 56px),
        radial-gradient(circle at 32% 0%, rgba(140,0,0,.95) 0 38px, transparent 39px),
        radial-gradient(circle at 58% 0%, rgba(120,0,0,.95) 0 60px, transparent 61px),
        radial-gradient(circle at 79% 0%, rgba(150,0,0,.95) 0 42px, transparent 43px),
        radial-gradient(circle at 93% 0%, rgba(120,0,0,.95) 0 50px, transparent 51px),
        linear-gradient(to bottom, rgba(110,0,0,.85), rgba(70,0,0,.25) 24%, transparent 55%);
    }

    #blood.on{
      animation:bloodDrop 1.15s ease-out;
    }

    @keyframes bloodDrop{
      0%{opacity:0; transform:translateY(-22px);}
      25%{opacity:1;}
      100%{opacity:0; transform:translateY(10px);}
    }
  </style>
</head>
<body>
  <div id="flash"></div>
  <div id="blood"></div>
  <div id="jumpScare"></div>

  <h1>👻 霊感クイズ</h1>

  <div class="container">
    <div id="count"></div>
    <div id="question"></div>
    <div id="buttons"></div>
    <div id="result"></div>
    <div class="small">※ホラー演出つきのエンタメ診断です</div>
  </div>

  <script>
    const questions = [
      "初めて行く場所なのに、来たことがある気がする？",
      "夢で見たことが現実になったことがある？",
      "人の気持ちをなんとなく感じることがある？",
      "嫌な予感が当たることがある？",
      "誰もいないのに気配を感じることがある？",
      "突然ゾクッとする場所がある？",
      "夜中に目が覚めて何かを感じることがある？",
      "写真を見ると、その場の空気を感じることがある？",
      "金縛りにあったことがある？",
      "人に『勘が鋭い』と言われることがある？",
      "古い建物に入ると空気が重いと感じる？",
      "誰かに見られている気がすることがある？",
      "知らない景色が夢に出てきたことがある？",
      "直感で決めたことが当たりやすい？",
      "人混みに行くとどっと疲れる？",
      "急に寒気がすることがある？",
      "場所によって落ち着かない感じがある？",
      "偶然にしては出来すぎた体験がある？",
      "不思議な音を聞いたことがある？",
      "自分には少し霊感があると思う？"
    ];

    let current = 0;
    let score = 0;
    let soundEnabled = false;
    let audioCtx = null;
    let bgmInterval = null;

    function initAudio(){
      if(audioCtx) return;
      const AudioContextClass = window.AudioContext || window.webkitAudioContext;
      if(!AudioContextClass) return;
      audioCtx = new AudioContextClass();
    }

    function ensureAudioRunning(){
      if(!audioCtx) return;
      if(audioCtx.state === "suspended"){
        audioCtx.resume().catch(()=>{});
      }
    }

    function playTone(freq = 220, duration = .15, type = "sine", volume = .05){
      if(!soundEnabled || !audioCtx) return;
      ensureAudioRunning();
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = type;
      osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
      gain.gain.setValueAtTime(volume, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start();
      osc.stop(audioCtx.currentTime + duration);
    }

    function playScareSound(){
      if(!soundEnabled || !audioCtx) return;
      ensureAudioRunning();

      const now = audioCtx.currentTime;
      const osc1 = audioCtx.createOscillator();
      const osc2 = audioCtx.createOscillator();
      const gain = audioCtx.createGain();

      osc1.type = "sawtooth";
      osc2.type = "triangle";

      osc1.frequency.setValueAtTime(880, now);
      osc1.frequency.exponentialRampToValueAtTime(120, now + .45);

      osc2.frequency.setValueAtTime(660, now);
      osc2.frequency.exponentialRampToValueAtTime(95, now + .45);

      gain.gain.setValueAtTime(.0001, now);
      gain.gain.exponentialRampToValueAtTime(.12, now + .02);
      gain.gain.exponentialRampToValueAtTime(.0001, now + .5);

      osc1.connect(gain);
      osc2.connect(gain);
      gain.connect(audioCtx.destination);

      osc1.start(now);
      osc2.start(now);
      osc1.stop(now + .52);
      osc2.stop(now + .52);
    }

    function startBgmLoop(){
      if(!soundEnabled || !audioCtx) return;
      if(bgmInterval) clearInterval(bgmInterval);

      const drone = () => {
        if(!soundEnabled || !audioCtx) return;
        ensureAudioRunning();
        const now = audioCtx.currentTime;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();

        osc.type = "sine";
        osc.frequency.setValueAtTime(72, now);

        gain.gain.setValueAtTime(.0001, now);
        gain.gain.exponentialRampToValueAtTime(.03, now + .8);
        gain.gain.exponentialRampToValueAtTime(.0001, now + 4.2);

        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start(now);
        osc.stop(now + 4.3);

        setTimeout(() => {
          playTone(144, .18, "triangle", .015);
        }, 1800);
      };

      drone();
      bgmInterval = setInterval(drone, 4200);
    }

    function showStartScreen(){
      document.getElementById("count").textContent = "";
      document.getElementById("question").innerHTML = "音ありで始めますか？";
      document.getElementById("buttons").innerHTML = `
        <button class="start-btn" onclick="startQuiz(true)">🔊 音ありで始める</button>
        <button onclick="startQuiz(false)">🔇 音なしで始める</button>
      `;
      document.getElementById("result").innerHTML = "";
    }

    function startQuiz(withSound){
      soundEnabled = withSound;
      initAudio();
      ensureAudioRunning();

      if(withSound){
        startBgmLoop();
      }else{
        if(bgmInterval) clearInterval(bgmInterval);
      }

      current = 0;
      score = 0;
      showQuestion();
    }

    function showQuestion(){
      if(current >= questions.length){
        showResult();
        return;
      }

      document.getElementById("count").textContent =
        "質問 " + (current + 1) + " / " + questions.length;

      document.getElementById("question").innerHTML =
        "<div>" + questions[current] + "</div>";

      document.getElementById("buttons").innerHTML = `
        <button onclick="answer(3, event)">よくある</button>
        <button onclick="answer(2, event)">たまにある</button>
        <button onclick="answer(1, event)">あまりない</button>
        <button onclick="answer(0, event)">ない</button>
      `;

      document.getElementById("result").innerHTML = "";
    }

    function answer(point, event){
      score += point;

      const x = event ? event.clientX : window.innerWidth / 2;
      const y = event ? event.clientY : window.innerHeight / 2;

      tapGhost(x, y);

      const rand = Math.random();
      if(rand < 0.35){
        setTimeout(crossGhost, 120);
      }else if(rand < 0.52){
        setTimeout(jumpScare, 130);
      }else if(rand < 0.68){
        setTimeout(bloodEffect, 90);
      }

      current++;
      setTimeout(showQuestion, 450);
    }

    function tapGhost(x, y){
      const ghost = document.createElement("img");
      ghost.src = "https://i.imgur.com/8Q2QY1F.png";
      ghost.className = "tap-ghost";
      ghost.style.left = x + "px";
      ghost.style.top = y + "px";
      document.body.appendChild(ghost);

      flashEffect();
      shakeScreen();
      vibratePhone();
      playScareSound();

      setTimeout(() => {
        ghost.remove();
      }, 950);
    }

    function crossGhost(){
      const ghost = document.createElement("img");
      ghost.src = "https://i.imgur.com/8Q2QY1F.png";
      ghost.className = "cross-ghost";
      document.body.appendChild(ghost);

      flashEffect();
      shakeScreen();
      vibratePhone([80, 30, 80]);
      playScareSound();

      setTimeout(() => {
        ghost.remove();
      }, 1500);
    }

    function jumpScare(){
      const scare = document.getElementById("jumpScare");
      scare.style.display = "block";

      flashEffect();
      shakeScreen();
      bloodEffect();
      vibratePhone([120, 40, 120]);
      playScareSound();

      setTimeout(() => {
        scare.style.display = "none";
      }, 700);
    }

    function bloodEffect(){
      const blood = document.getElementById("blood");
      blood.classList.remove("on");
      void blood.offsetWidth;
      blood.classList.add("on");
    }

    function flashEffect(){
      const flash = document.getElementById("flash");
      flash.classList.remove("on");
      void flash.offsetWidth;
      flash.classList.add("on");
    }

    function shakeScreen(){
      document.body.classList.remove("shake");
      void document.body.offsetWidth;
      document.body.classList.add("shake");
      setTimeout(() => {
        document.body.classList.remove("shake");
      }, 390);
    }

    function vibratePhone(pattern = [60, 40, 90]){
      if(navigator.vibrate){
        navigator.vibrate(pattern);
      }
    }

    function getResult(percent){
      if(percent >= 85){
        return {
          title:"🔮 かなり霊感が強い",
          desc:"人や場所の空気の変化にかなり敏感なタイプ。無理に怖い場所へ行かない方がよさそうです…。"
        };
      }
      if(percent >= 65){
        return {
          title:"👻 霊感がある",
          desc:"直感がかなり鋭く、見えない違和感を拾いやすいタイプかもしれません。"
        };
      }
      if(percent >= 40){
        return {
          title:"✨ 直感が鋭い",
          desc:"霊感というより、勘や感受性が高めのタイプ。空気を読む力がありそうです。"
        };
      }
      return {
        title:"🙂 現実派タイプ",
        desc:"落ち着いて物事を判断するタイプ。怖い話でも比較的冷静に楽しめそうです。"
      };
    }

    function showResult(){
      const maxScore = questions.length * 3;
      const percent = Math.round((score / maxScore) * 100);
      const result = getResult(percent);

      document.getElementById("count").textContent = "診断結果";
      document.getElementById("question").innerHTML = "";
      document.getElementById("buttons").innerHTML = `
        <button class="share-btn" onclick="shareX()">Xでシェア</button>
        <button class="retry-btn" onclick="showStartScreen()">もう一度やる</button>
      `;

      document.getElementById("result").innerHTML = `
        <div class="result-title">${result.title}</div>
        <div class="percent">霊感レベル ${percent}%</div>
        <div class="score">スコア ${score} / ${maxScore}</div>
        <div class="desc">${result.desc}</div>
      `;
    }

    function shareX(){
      const maxScore = questions.length * 3;
      const percent = Math.round((score / maxScore) * 100);
      const result = getResult(percent);
      const url = "https://jun4668.github.io/Reikan/";
      const text = `👻霊感クイズをやってみた\n${result.title}\n霊感レベル ${percent}%`;

      window.open(
        "https://twitter.com/intent/tweet?text=" +
        encodeURIComponent(text) +
        "&url=" +
        encodeURIComponent(url),
        "_blank"
      );
    }

    showStartScreen();
  </script>
</body>
</html>
